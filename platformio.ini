[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

monitor_speed = 115200

lib_deps =
    bodmer/TFT_eSPI @ ^2.5.43
    kosme/arduinoFFT @ ^2.0.1

; TFT_eSPI configuration for ST7796 3.5" 480x320 SPI display
; USER_SETUP_LOADED tells the library to skip its own User_Setup.h
build_flags =
    -DUSER_SETUP_LOADED
    -DST7796_DRIVER
    -DTFT_WIDTH=320
    -DTFT_HEIGHT=480
    -DTFT_MOSI=23
    -DTFT_SCLK=18
    -DTFT_CS=5
    -DTFT_DC=2
    -DTFT_RST=4
    -DTFT_MISO=-1
    -DSPI_FREQUENCY=40000000
    -DSPI_READ_FREQUENCY=20000000
    -DLOAD_GLCD
    -DLOAD_FONT2
    -DLOAD_FONT4
    -DLOAD_FONT6
    -DLOAD_FONT7
    -DLOAD_FONT8
    -DLOAD_GFXFF
    -DSMOOTH_FONT
