[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

monitor_speed = 115200

lib_deps =
    bodmer/TFT_eSPI @ ^2.5.43
    kosme/arduinoFFT @ ^2.0.1

; TFT_eSPI configuration for ILI9488 3.5" 480x320 SPI display
; with XPT2046 4-wire resistive touch panel (shares the VSPI bus).
; USER_SETUP_LOADED tells the library to skip its own User_Setup.h.
;
; NOTE: touch needs MISO connected (XPT2046 returns data on it) — unlike the
; old display-only wiring where MISO was unused. TOUCH_CS is the touch chip's
; own select line; it shares MOSI/SCLK/MISO with the display.
build_flags =
    -DUSER_SETUP_LOADED
    -DILI9488_DRIVER
    -DTFT_WIDTH=320
    -DTFT_HEIGHT=480
    -DTFT_MOSI=23
    -DTFT_SCLK=18
    -DTFT_CS=5
    -DTFT_DC=2
    -DTFT_RST=4
    -DTFT_MISO=19
    -DTOUCH_CS=21
    -DSPI_FREQUENCY=40000000
    -DSPI_READ_FREQUENCY=20000000
    -DSPI_TOUCH_FREQUENCY=2500000
    -DLOAD_GLCD
    -DLOAD_FONT2
    -DLOAD_FONT4
    -DLOAD_FONT6
    -DLOAD_FONT7
    -DLOAD_FONT8
    -DLOAD_GFXFF
    -DSMOOTH_FONT

; Host-side unit tests for the DSP/speed math (no hardware needed):
;   pio test -e native
; The test reproduces the firmware's speed-from-FFT path against a synthetic
; signal and the real constants in config.h. src/ is not built into the test
; (it needs the Arduino toolchain), so this env stays pure-host.
[env:native]
platform = native
test_framework = custom
build_flags = -std=c++11
