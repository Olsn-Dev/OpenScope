; LILYGO T-Energy-S3 (ESP32-S3-WROOM-1-N16R8): 16 MB flash, 8 MB octal PSRAM,
; 18650 holder, native USB-C (no UART bridge — serial is USB CDC).
[env:tenergy_s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

monitor_speed = 115200

board_upload.flash_size = 16MB
board_build.partitions = default_16MB.csv

lib_deps =
    bodmer/TFT_eSPI @ ^2.5.43
    kosme/arduinoFFT @ ^2.0.1

; TFT_eSPI configuration for ILI9488 3.5" 480x320 SPI display (display only —
; navigation is three physical buttons on GPIO2/4/5, see src/config.h).
; USER_SETUP_LOADED tells the library to skip its own User_Setup.h.
;
; TFT_MISO (display SDO) is only used for readback; the firmware never reads
; the panel, so SDO may be left unwired.
; Pin choices target the T-Energy-S3 headers: IO9–14 sit together on one
; header (with a GND pin) and IO10–13 are the ESP32-S3's native FSPI
; IO_MUX pins, so the display runs at full SPI speed.
;
; USE_FSPI_PORT is mandatory on the ESP32-S3: without it TFT_eSPI's direct
; register writes resolve SPI_PORT to 0, and IDF's REG_SPI_BASE(0) is the
; literal address 0 → StoreProhibited crash (EXCVADDR 0x10) in tft.init().
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DUSER_SETUP_LOADED
    -DILI9488_DRIVER
    -DUSE_FSPI_PORT
    -DTFT_WIDTH=320
    -DTFT_HEIGHT=480
    -DTFT_MOSI=11
    -DTFT_SCLK=12
    -DTFT_CS=10
    -DTFT_DC=9
    -DTFT_RST=14
    -DTFT_MISO=13
    -DSPI_FREQUENCY=40000000
    -DSPI_READ_FREQUENCY=20000000
    -DLOAD_GLCD
    -DLOAD_FONT2
    -DLOAD_FONT4
    -DLOAD_FONT6
    -DLOAD_FONT7
    -DLOAD_FONT8
    -DLOAD_GFXFF
    -DSMOOTH_FONT

; Host-side unit tests for the DSP/speed math (no hardware needed):
;   pio test -e native
; The test reproduces the firmware's speed-from-FFT path against a synthetic
; signal and the real constants in config.h. src/ is not built into the test
; (it needs the Arduino toolchain), so this env stays pure-host.
[env:native]
platform = native
test_framework = custom
build_flags = -std=c++11
